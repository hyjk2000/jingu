name: Publish to JSR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for JSR OIDC publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.8.2"

      - name: Install dependencies
        run: deno install --frozen

      - name: Vendor tree-sitter WASM
        run: deno task embed:wasm

      - name: Publish to JSR
        run: deno publish
